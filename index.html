<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Dr.G 실험 페이지</title>

  <style>
    body {
      font-family: Arial;
      background-color: #f4f7fb;
      margin: 0;
    }

    header {
      background-color: #2e7d32;
      color: white;
      text-align: center;
      padding: 15px;
      font-size: 22px;
    }

    .container {
      display: flex;
      justify-content: center;
      margin-top: 40px;
    }

    .product {
      background: white;
      padding: 20px;
      width: 320px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      text-align: center;
    }

    .product img {
      width: 100%;
      border-radius: 10px;
    }

    .price {
      color: #2e7d32;
      font-size: 22px;
      margin: 10px 0;
    }

    .btn {
      background-color: #2e7d32;
      border: none;
      padding: 12px;
      width: 100%;
      color: white;
      font-size: 16px;
      cursor: pointer;
      border-radius: 6px;
    }

    .btn:hover {
      background-color: #1b5e20;
    }
  </style>
</head>

<body>

<header>🌿 Dr.G 공식 테스트 스토어</header>

<div class="container">
  <div class="product">
    <img src="https://via.placeholder.com/300" alt="Dr.G 제품">

    <h2>Dr.G 레드 블레미쉬 크림</h2>
    <p>민감 피부를 진정시키고 수분을 공급하는 크림</p>

    <div class="price">₩32,000</div>

    <button class="btn" onclick="buy()">지금 구매</button>
  </div>
</div>

<script>
  function buy() {
    alert("구매 버튼 클릭 (실험 데이터 기록 가능)");
  }
</script>

</body>
</html>
